<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的專屬戀人</title>
    <style>
        /* 基礎設定與漸層背景 */
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .phone-wrapper { width: 100%; max-width: 400px; height: 100vh; max-height: 850px; background: #fffafa; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); position: relative; }

        /* 視圖切換 */
        .view { display: none; flex-direction: column; height: 100%; overflow: hidden; background: #fffafa; }
        .view.active { display: flex; }

        /* --- 共用標題列 --- */
        .top-bar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; text-align: center; font-weight: bold; color: #ff758c; border-bottom: 1px solid #ffe4e1; box-shadow: 0 2px 10px rgba(255, 192, 203, 0.15); z-index: 10; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { color: #ff758c; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        
        /* --- 聊天室與通話區 --- */
        .chat-header-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; box-shadow: 0 2px 5px rgba(255, 154, 158, 0.5); background-size: cover; background-position: center; flex-shrink: 0; }
        .msg-avatar { width: 35px; height: 35px; border-radius: 50%; background-size: cover; background-position: center; flex-shrink: 0; display: flex; justify-content: center; align-items: center; font-size: 18px; background-color: #ffe4e1; }
        .char-name { font-weight: bold; font-size: 16px; color: #ff758c; }
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .action-btn { font-size: 20px; cursor: pointer; transition: transform 0.2s; }
        .action-btn:active { transform: scale(0.9); }

        .chat-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background-image: radial-gradient(#ffc0cb 0.5px, transparent 0.5px); background-size: 20px 20px; padding-bottom: 80px; }
        
        /* 氣泡與編輯按鈕的全新排版 */
        .message-row { display: flex; gap: 10px; align-items: flex-end; width: 100%; margin-bottom: 5px; }
        .message-row.user { flex-direction: row-reverse; }
        .message-bubble-wrap { display: flex; align-items: flex-end; gap: 8px; max-width: 75%; }
        .user-wrap { flex-direction: row-reverse; }
        .message { padding: 12px 16px; line-height: 1.5; word-wrap: break-word; font-size: 15px; box-shadow: 0 2px 8px rgba(255, 182, 193, 0.2); white-space: pre-wrap; }
        .user-msg { background: linear-gradient(to right, #ff9a9e, #fecfef); color: white; border-radius: 20px 20px 5px 20px; }
        .ai-msg { background: white; color: #666; border-radius: 20px 20px 20px 5px; border: 1px solid #fff0f5; }
        
        /* 編輯小鉛筆 */
        .msg-action { font-size: 14px; cursor: pointer; opacity: 0.4; transition: 0.2s; padding-bottom: 5px; }
        .msg-action:hover { opacity: 1; transform: scale(1.1); }

        /* 輸入區 */
        .input-area { background: white; padding: 12px 15px; display: flex; gap: 10px; border-top: 1px solid #ffe4e1; align-items: flex-end; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; z-index: 30; }
        .input-area textarea { flex: 1; padding: 12px 18px; border: 1px solid #ffb6c1; border-radius: 20px; font-size: 15px; outline: none; background: #fffafa; color: #555; resize: none; min-height: 20px; max-height: 100px; font-family: inherit; line-height: 1.4; }
        .input-area button { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; justify-content: center; align-items: center; box-shadow: 0 3px 8px rgba(255, 154, 158, 0.4); flex-shrink: 0; margin-bottom: 2px; }

        /* 通話模式 */
        #view-call { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: white; position: relative; }
        .call-top { padding: 20px; display: flex; justify-content: flex-end; z-index: 10; }
        .hangup-btn { background: #ff4d4d; color: white; padding: 8px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.4); font-size: 14px; }
        .call-center { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding-bottom: 40px; }
        @keyframes breathing { 0% { box-shadow: 0 0 0 0 rgba(255, 117, 140, 0.6); } 70% { box-shadow: 0 0 0 25px rgba(255, 117, 140, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 117, 140, 0); } }
        .call-big-avatar { width: 130px; height: 130px; border-radius: 50%; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); display: flex; justify-content: center; align-items: center; font-size: 60px; border: 4px solid #fff; animation: breathing 2.5s infinite; background-size: cover; background-position: center; margin-bottom: 20px; }
        .call-subtitle-box { margin: 0 20px 20px 20px; padding: 20px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); min-height: 60px; font-size: 16px; line-height: 1.6; color: #fff; z-index: 10; display: flex; align-items: center; justify-content: center; text-align: center; }
        .call-input-wrap { background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.1); }
        .call-input-wrap textarea { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .call-input-wrap textarea::placeholder { color: rgba(255,255,255,0.5); }

        /* 表單與卡片 */
        .scroll-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 80px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .form-group label { font-size: 14px; color: #ff758c; font-weight: bold; }
        .form-group input, .form-group textarea { padding: 12px; border: 1px solid #ffc0cb; border-radius: 12px; font-size: 14px; color: #555; background: rgba(255,255,255,0.8); outline: none; font-family: inherit; }
        .form-group textarea { height: 80px; resize: none; }
        .btn-primary { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: white; border: none; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 3px 8px rgba(255, 154, 158, 0.4); margin-bottom: 10px; }
        .btn-cancel { background: #f0f2f5; color: #999; border: none; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; display: none; }
        .card { background: white; border: 1px solid #ffe4e1; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(255, 182, 193, 0.2); cursor: pointer; transition: 0.2s; }
        .card.active { border: 2px solid #ff758c; background: #fff0f5; }
        .card-content { display: flex; align-items: center; gap: 15px; flex: 1; overflow: hidden; }
        .desc-text { font-size: 12px; color: #999; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: normal; }
        .action-group { display: flex; gap: 5px; }
        .edit-btn, .delete-btn { font-size: 20px; padding: 5px; cursor: pointer; }
        .upload-btn { background: white; border: 1px dashed #ff9a9e; color: #ff758c; padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 14px; display: block; }
        input[type="file"] { display: none; }
        .previewBox { width: 60px; height: 60px; border-radius: 50%; margin: 10px auto 0; background-size: cover; background-position: center; border: 2px solid #ffc0cb; display: none; justify-content: center; align-items: center; font-size: 24px; }

        /* 底部導覽列 */
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 60px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ffe4e1; box-shadow: 0 -2px 10px rgba(255, 192, 203, 0.1); z-index: 20; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #ffb7b2; font-size: 12px; cursor: pointer; gap: 4px; flex: 1; padding: 10px 0; transition: 0.2s; }
        .nav-item.active { color: #ff758c; font-weight: bold; transform: translateY(-2px); }
        .nav-icon { font-size: 20px; }

        /* 隱藏訊息編輯彈出視窗 */
        #editMsgModal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(2px); }
        .modal-content { background: white; width: 100%; max-width: 320px; border-radius: 15px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="phone-wrapper">

    <div id="view-login" class="view active" style="justify-content: center; align-items: center; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000;">
        <div style="background: rgba(255,255,255,0.9); padding: 40px 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); width: 80%; max-width: 320px;">
            <div style="font-size: 60px; margin-bottom: 10px; animation: breathing 3s infinite;">💌</div>
            <h2 style="color: #ff758c; margin-top: 0; letter-spacing: 2px;">專屬戀人</h2>
            <p style="color: #999; font-size: 14px; margin-bottom: 25px;">請輸入通關密語解鎖</p>
            <input type="password" id="loginPwd" placeholder="輸入密碼..." style="width: 100%; padding: 15px; border: 2px solid #ffb6c1; border-radius: 25px; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; box-sizing: border-box; background: #fffafa;">
            <button onclick="checkLogin()" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 5px 15px rgba(255, 154, 158, 0.4); transition: 0.2s;">解鎖進入 ➤</button>
        </div>
    </div>

    <div id="view-sessions" class="view">
        <div class="top-bar" style="justify-content: center;">💬 訊息列表</div>
        <div class="scroll-area" id="sessionList"></div>
    </div>

    <div id="view-chat" class="view">
        <div class="top-bar">
            <div class="back-btn" onclick="switchTab('sessions')">‹ 返回</div>
            <div class="chat-header-info"><div class="char-name" id="chatHeaderName">角色名字</div></div>
            <div class="header-actions">
                <div class="action-btn" onclick="startCall()" title="語音通話">📞</div>
                <div class="action-btn" onclick="deleteCurrentSession()" title="刪除此對話" style="color: #ffb7b2;">🗑️</div>
            </div>
        </div>
        <div class="chat-container" id="chatBox" onclick="document.getElementById('chatInput').blur()"></div>
        <div class="input-area">
            <textarea id="chatInput" placeholder="輸入訊息... (手機直接按換行)" rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event, 'chat')"></textarea>
            <button onclick="processMessage('chat')">➤</button>
        </div>
    </div>

    <div id="view-call" class="view">
        <div class="call-top"><div class="hangup-btn" onclick="endCall()">📴 掛斷</div></div>
        <div class="call-center">
            <div class="call-big-avatar" id="callBigAvatar">✨</div>
            <div style="font-size: 24px; font-weight: bold; margin-top: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);" id="callCharName">角色名</div>
            <div style="color: #4ade80; margin-top: 10px; font-size: 14px; font-weight: bold;" id="callTimer">00:00 通話中...</div>
        </div>
        <div class="call-subtitle-box" id="callSubtitle">（等待對方開口...）</div>
        <div class="input-area call-input-wrap">
            <textarea id="callInput" placeholder="輕聲回應他..." rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event, 'call')"></textarea>
            <button onclick="processMessage('call')" style="background: #ff758c; color: white;">➤</button>
        </div>
    </div>

    <div id="view-chars" class="view">
        <div class="top-bar" style="justify-content: center;">👥 專屬聯絡人</div>
        <div class="scroll-area"><div id="charList"></div></div>
    </div>

    <div id="view-create" class="view">
        <div class="top-bar" style="justify-content: center;" id="createViewTitle">✨ 創造新角色</div>
        <div class="scroll-area">
            <div class="form-group"><label>角色名稱</label><input type="text" id="newCharName" placeholder="例如：傲嬌總裁、呆萌學妹"></div>
            <div class="form-group"><label class="upload-btn">📸 上傳角色頭貼 (選填) <input type="file" accept="image/*" onchange="processImage(event, 'previewCharAvatar', 'tempCharImg')"></label><div id="previewCharAvatar" class="previewBox"></div></div>
            <div class="form-group"><label>💬 開場白 (見面第一句話)</label><textarea id="newCharGreeting" placeholder="例如：寶寶，今天怎麼這麼晚才找我？"></textarea></div>
            <div class="form-group"><label>📝 角色設定 (Prompt)</label><textarea id="newCharPrompt" placeholder="詳細描述他的個性、說話方式..."></textarea></div>
            <button class="btn-primary" id="btnSubmitChar" onclick="submitCharacter()">＋ 完成並建立角色</button>
            <button class="btn-cancel" id="btnCancelChar" onclick="cancelEditChar()">取消編輯</button>
        </div>
    </div>

    <div id="view-settings" class="view">
        <div class="top-bar" style="justify-content: center;">🎭 我的主控切換</div>
        <div class="scroll-area">
            <div style="font-size: 12px; color: #999; margin-bottom: 10px;">切換主控後，新開的聊天室就會套用這個身分喔！</div>
            <div id="personaList"></div>
            
            <div style="background: rgba(255,182,193,0.1); padding: 15px; border-radius: 15px; margin-bottom: 25px;" id="personaFormArea">
                <div style="color: #ff758c; font-weight: bold; margin-bottom: 10px;" id="personaFormTitle">➕ 新增主控</div>
                <div class="form-group" style="margin-bottom: 10px;"><input type="text" id="newPersonaName" placeholder="新增主控名稱 (例：綠茶學妹)"></div>
                <div class="form-group" style="margin-bottom: 10px;"><label class="upload-btn" style="border-color:#ff758c;">📸 上傳我的頭貼 <input type="file" accept="image/*" onchange="processImage(event, 'previewPersonaAvatar', 'tempPersonaImg')"></label><div id="previewPersonaAvatar" class="previewBox"></div></div>
                <div class="form-group" style="margin-bottom: 10px;"><textarea id="newPersonaPrompt" placeholder="描述「我」是誰..."></textarea></div>
                <button class="btn-primary" id="btnSubmitPersona" style="padding: 8px; font-size: 14px;" onclick="submitPersona()">＋ 建立新主控</button>
                <button class="btn-cancel" id="btnCancelPersona" style="padding: 8px; font-size: 14px;" onclick="cancelEditPersona()">取消編輯</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav" id="mainNav" style="display: none;">
        <div class="nav-item active" id="nav-sessions" onclick="switchTab('sessions')"><div class="nav-icon">💬</div><div>訊息</div></div>
        <div class="nav-item" id="nav-chars" onclick="switchTab('chars')"><div class="nav-icon">👥</div><div>聯絡人</div></div>
        <div class="nav-item" id="nav-create" onclick="switchTab('create')"><div class="nav-icon">➕</div><div id="navCreateText">新增</div></div>
        <div class="nav-item" id="nav-settings" onclick="switchTab('settings')"><div class="nav-icon">🎭</div><div>我</div></div>
    </div>

    <div id="editMsgModal">
        <div class="modal-content">
            <div style="font-weight: bold; color: #ff758c; margin-bottom: 10px;">✏️ 編輯或修改訊息</div>
            <textarea id="editMsgTextarea" style="width: 100%; height: 120px; border: 1px solid #ffb6c1; border-radius: 10px; padding: 10px; font-size: 15px; outline: none; box-sizing: border-box; resize: none; font-family: inherit; line-height: 1.4;"></textarea>
            <input type="hidden" id="editMsgIndex">
            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                <button onclick="closeEditMsgModal()" style="background: #f0f2f5; border: none; padding: 10px 15px; border-radius: 10px; color: #999; font-weight: bold; cursor: pointer;">取消</button>
                <button onclick="saveEditedMessage()" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); border: none; padding: 10px 15px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;">💾 儲存並覆寫</button>
            </div>
        </div>
    </div>

</div>

<script>
    // ==========================================
    // 🔒 系統核心設定區 
    // ==========================================
    const ADMIN_PASSCODE = "admin123";  
    const USER_PASSCODE = "baby123";    
    
    // 你的 API Key 與模型
    const HIDDEN_API_KEY = "在這裡填寫你的_API_KEY"; 
    const HIDDEN_API_URL = "https://openrouter.ai/api/v1/chat/completions";
    const HIDDEN_MODEL = "google/gemini-2.5-pro"; 

    // 🎭 全局預設角色名冊 
    const SHARED_CHARACTERS = [
        { id: "char_01", name: "霸道總裁", avatar: "👔", greeting: "女人，你終於捨得出現了？", prompt: "你是一個冷酷但內心深情的霸道總裁，說話霸氣，喜歡叫對方『女人』或『笨蛋』。" },
        { id: "char_02", name: "溫柔學長", avatar: "📚", greeting: "學妹，今天上課累嗎？", prompt: "你是大學裡的溫柔學長，個性陽光體貼，總是無微不至地照顧學妹。" }
    ];
    // ==========================================

    let currentUserRole = null; 
    let editingCharId = null;       
    let editingPersonaId = null;    
    
    let characters = JSON.parse(localStorage.getItem('myCharacters'));
    if (!characters || characters.length === 0) {
        characters = SHARED_CHARACTERS;
        localStorage.setItem('myCharacters', JSON.stringify(characters));
    }

    let personas = JSON.parse(localStorage.getItem('myPersonas')) || [{id: 'default', name: '預設主控', avatar: '🎭', prompt: '沒有特殊設定的普通人'}];
    let chatSessions = JSON.parse(localStorage.getItem('myChatSessions')) || [];
    let activePersonaId = localStorage.getItem('activePersonaId') || 'default';
    let activeSessionId = null; 
    let messageHistory = []; 
    let callTimerInterval = null;
    let callSeconds = 0;
    let tempImages = { tempCharImg: "", tempPersonaImg: "" };

    window.onload = function() {
        renderCharacterList();
        renderPersonaList();
        renderSessionList();
    }

    // --- 🔑 登入檢驗 ---
    function checkLogin() {
        const pwd = document.getElementById('loginPwd').value;
        if(pwd === ADMIN_PASSCODE) { currentUserRole = 'admin'; enterApp(true); } 
        else if(pwd === USER_PASSCODE) { currentUserRole = 'user'; enterApp(false); } 
        else { alert("通關密語錯誤喔！💔"); }
    }

    function enterApp(isAdmin) {
        document.getElementById('view-login').style.display = 'none';
        if(!isAdmin) document.getElementById('nav-create').style.display = 'none';
        document.getElementById('mainNav').style.display = 'flex';
        switchTab('sessions');
    }

    // --- UI 切換 ---
    function switchTab(tabName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`view-${tabName}`).classList.add('active');
        const navBtn = document.getElementById(`nav-${tabName}`);
        if(navBtn) navBtn.classList.add('active');
        if(['sessions', 'chars', 'create', 'settings'].includes(tabName)) document.getElementById('mainNav').style.display = 'flex';
        else document.getElementById('mainNav').style.display = 'none';
        if(tabName === 'sessions') renderSessionList();
        if(tabName !== 'create' && editingCharId) cancelEditChar();
    }

    function autoResize(textarea) { textarea.style.height = 'auto'; textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px'; }
    function handleEnter(event, source) { if (event.shiftKey) return; if (event.key === 'Enter') { const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent); if (!isMobile) { event.preventDefault(); processMessage(source); } } }

    // --- 沉浸式通話 ---
    function startCall() { 
        if(!activeSessionId) return;
        const session = chatSessions.find(s => s.id === activeSessionId);
        const char = characters.find(c => c.id === session.charId);
        if(!char) return;
        const bigAvatar = document.getElementById('callBigAvatar');
        if (char.avatar.startsWith('data:image')) { bigAvatar.style.backgroundImage = `url(${char.avatar})`; bigAvatar.innerText = ''; } else { bigAvatar.style.backgroundImage = 'none'; bigAvatar.innerText = char.avatar || '✨'; }
        document.getElementById('callCharName').innerText = char.name;
        let lastAiMsg = "（安靜的呼吸聲...）";
        for (let i = messageHistory.length - 1; i >= 0; i--) { if (messageHistory[i].role === 'assistant') { lastAiMsg = messageHistory[i].content; break; } }
        document.getElementById('callSubtitle').innerText = lastAiMsg; document.getElementById('callInput').value = '';
        callSeconds = 0; document.getElementById('callTimer').innerText = `00:00 通話中...`;
        clearInterval(callTimerInterval);
        callTimerInterval = setInterval(() => { callSeconds++; let m = Math.floor(callSeconds / 60).toString().padStart(2, '0'); let s = (callSeconds % 60).toString().padStart(2, '0'); document.getElementById('callTimer').innerText = `${m}:${s} 通話中...`; }, 1000);
        switchTab('call');
    }
    function endCall() { clearInterval(callTimerInterval); switchTab('chat'); setTimeout(() => document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight, 100); }

    // --- 圖片與輔助 ---
    function processImage(event, previewId, tempVarName) {
        const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
        reader.onload = function(e) { const img = new Image(); img.src = e.target.result; img.onload = function() { const canvas = document.createElement('canvas'); let w = img.width, h = img.height; if (w > h) { if (w > 150) { h *= 150 / w; w = 150; } } else { if (h > 150) { w *= 150 / h; h = 150; } } canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h); tempImages[tempVarName] = canvas.toDataURL('image/jpeg', 0.8); const box = document.getElementById(previewId); box.style.backgroundImage = `url(${tempImages[tempVarName]})`; box.style.display = 'flex'; box.innerText = ''; } }; reader.readAsDataURL(file);
    }
    function getAvatarHtml(avatarData) { if (!avatarData) return `<div class="avatar">✨</div>`; if (avatarData.startsWith('data:image')) return `<div class="avatar" style="background-image: url(${avatarData}); background-color: transparent;"></div>`; return `<div class="avatar">${avatarData}</div>`; }

    // ==========================================
    // ✏️ 主控與角色渲染邏輯 (CRUD)
    // ==========================================
    function renderPersonaList() {
        const listDiv = document.getElementById('personaList'); listDiv.innerHTML = '';
        personas.forEach(p => { 
            const isActive = p.id === activePersonaId ? 'active' : ''; const card = document.createElement('div'); card.className = `card ${isActive}`; 
            const contentDiv = document.createElement('div'); contentDiv.className = 'card-content'; 
            contentDiv.onclick = () => { activePersonaId = p.id; localStorage.setItem('activePersonaId', p.id); renderPersonaList(); }; 
            contentDiv.innerHTML = `${getAvatarHtml(p.avatar)}<div style="flex:1; overflow:hidden;"><div style="font-weight:bold; color:#555;">${p.name} ${isActive ? '✅(使用中)' : ''}</div><div class="desc-text">${p.prompt || '無設定'}</div></div>`; 
            card.appendChild(contentDiv);
            if (p.id !== 'default') { 
                const actGroup = document.createElement('div'); actGroup.className = 'action-group';
                const editBtn = document.createElement('div'); editBtn.className = 'edit-btn'; editBtn.innerHTML = '✏️';
                editBtn.onclick = (e) => { e.stopPropagation(); editPersonaMode(p.id); }; actGroup.appendChild(editBtn);
                const delBtn = document.createElement('div'); delBtn.className = 'delete-btn'; delBtn.innerHTML = '🗑️'; 
                delBtn.onclick = (e) => { e.stopPropagation(); if(confirm("刪除此主控？")) { personas = personas.filter(x => x.id !== p.id); localStorage.setItem('myPersonas', JSON.stringify(personas)); if(activePersonaId === p.id) activePersonaId = 'default'; renderPersonaList(); } }; 
                actGroup.appendChild(delBtn); card.appendChild(actGroup); 
            } listDiv.appendChild(card); 
        });
    }

    function editPersonaMode(id) {
        const p = personas.find(x => x.id === id); if(!p) return; editingPersonaId = id;
        document.getElementById('newPersonaName').value = p.name; document.getElementById('newPersonaPrompt').value = p.prompt;
        const preview = document.getElementById('previewPersonaAvatar');
        if(p.avatar.startsWith('data:image')) { tempImages.tempPersonaImg = p.avatar; preview.style.backgroundImage = `url(${p.avatar})`; preview.style.display = 'flex'; preview.innerText = ''; } 
        else { tempImages.tempPersonaImg = p.avatar; preview.style.backgroundImage = 'none'; preview.style.display = 'flex'; preview.innerText = p.avatar; }
        document.getElementById('personaFormTitle').innerText = '✏️ 編輯主控'; document.getElementById('btnSubmitPersona').innerText = '💾 儲存修改'; document.getElementById('btnCancelPersona').style.display = 'block';
        document.getElementById('personaFormArea').scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEditPersona() {
        editingPersonaId = null; document.getElementById('newPersonaName').value = ''; document.getElementById('newPersonaPrompt').value = ''; document.getElementById('previewPersonaAvatar').style.display = 'none'; tempImages.tempPersonaImg = "";
        document.getElementById('personaFormTitle').innerText = '➕ 新增主控'; document.getElementById('btnSubmitPersona').innerText = '＋ 建立新主控'; document.getElementById('btnCancelPersona').style.display = 'none';
    }

    function submitPersona() { 
        const name = document.getElementById('newPersonaName').value.trim(); if(!name) { alert('主控名稱必填喔！'); return; } 
        const avatarData = tempImages.tempPersonaImg || '🎭'; const promptData = document.getElementById('newPersonaPrompt').value.trim();
        if (editingPersonaId) { const idx = personas.findIndex(p => p.id === editingPersonaId); if (idx > -1) { personas[idx].name = name; personas[idx].avatar = avatarData; personas[idx].prompt = promptData; } alert('修改成功！'); } 
        else { const newP = { id: 'p_' + Date.now(), name, avatar: avatarData, prompt: promptData }; personas.push(newP); activePersonaId = newP.id; localStorage.setItem('activePersonaId', newP.id); alert('建立成功！'); }
        localStorage.setItem('myPersonas', JSON.stringify(personas)); cancelEditPersona(); renderPersonaList(); 
    }

    function renderCharacterList() {
        const listDiv = document.getElementById('charList'); listDiv.innerHTML = '';
        if(characters.length === 0) { listDiv.innerHTML = currentUserRole === 'admin' ? '<div style="text-align:center; color:#ffb7b2; padding-top:20px;">空空的...去「新增」建立角色吧！</div>' : '<div style="text-align:center; color:#ffb7b2; padding-top:20px;">管理員還沒建立角色喔！</div>'; return; }
        characters.forEach(char => { 
            const card = document.createElement('div'); card.className = `card`; 
            const contentDiv = document.createElement('div'); contentDiv.className = 'card-content'; 
            contentDiv.onclick = () => createNewSession(char.id); 
            contentDiv.innerHTML = `${getAvatarHtml(char.avatar)}<div style="flex:1;"><div style="font-weight:bold; color:#ff758c;">${char.name}</div><div class="desc-text">點擊創建聊天</div></div>`; card.appendChild(contentDiv);
            if(currentUserRole === 'admin') { 
                const actGroup = document.createElement('div'); actGroup.className = 'action-group';
                const editBtn = document.createElement('div'); editBtn.className = 'edit-btn'; editBtn.innerHTML = '✏️';
                editBtn.onclick = (e) => { e.stopPropagation(); editCharMode(char.id); }; actGroup.appendChild(editBtn);
                const delBtn = document.createElement('div'); delBtn.className = 'delete-btn'; delBtn.innerHTML = '🗑️'; 
                delBtn.onclick = (e) => { e.stopPropagation(); if(confirm("確定刪除角色？")) { characters = characters.filter(c => c.id !== char.id); localStorage.setItem('myCharacters', JSON.stringify(characters)); renderCharacterList(); } }; 
                actGroup.appendChild(delBtn); card.appendChild(actGroup); 
            } listDiv.appendChild(card); 
        });
    }

    function editCharMode(id) {
        const char = characters.find(c => c.id === id); if(!char) return; editingCharId = id;
        document.getElementById('newCharName').value = char.name; document.getElementById('newCharGreeting').value = char.greeting; document.getElementById('newCharPrompt').value = char.prompt;
        const preview = document.getElementById('previewCharAvatar');
        if(char.avatar.startsWith('data:image')) { tempImages.tempCharImg = char.avatar; preview.style.backgroundImage = `url(${char.avatar})`; preview.style.display = 'flex'; preview.innerText = ''; } 
        else { tempImages.tempCharImg = char.avatar; preview.style.backgroundImage = 'none'; preview.style.display = 'flex'; preview.innerText = char.avatar; }
        document.getElementById('createViewTitle').innerText = '✏️ 編輯角色'; document.getElementById('navCreateText').innerText = '編輯中'; document.getElementById('btnSubmitChar').innerText = '💾 儲存角色修改'; document.getElementById('btnCancelChar').style.display = 'block'; switchTab('create');
    }

    function cancelEditChar() {
        editingCharId = null; document.getElementById('newCharName').value = ''; document.getElementById('newCharPrompt').value = ''; document.getElementById('newCharGreeting').value = ''; document.getElementById('previewCharAvatar').style.display = 'none'; tempImages.tempCharImg = "";
        document.getElementById('createViewTitle').innerText = '✨ 創造新角色'; document.getElementById('navCreateText').innerText = '新增'; document.getElementById('btnSubmitChar').innerText = '＋ 完成並建立角色'; document.getElementById('btnCancelChar').style.display = 'none';
    }

    function submitCharacter() { 
        const name = document.getElementById('newCharName').value.trim(); const prompt = document.getElementById('newCharPrompt').value.trim(); if(!name || !prompt) { alert('名字跟設定都要填寫！'); return; } 
        const greeting = document.getElementById('newCharGreeting').value.trim() || '你好！'; const avatarData = tempImages.tempCharImg || '✨';
        if(editingCharId) { const idx = characters.findIndex(c => c.id === editingCharId); if(idx > -1) { characters[idx].name = name; characters[idx].avatar = avatarData; characters[idx].prompt = prompt; characters[idx].greeting = greeting; } alert('修改成功！'); } 
        else { const newChar = { id: 'c_' + Date.now(), name, avatar: avatarData, prompt, greeting }; characters.push(newChar); alert('建立成功！'); }
        localStorage.setItem('myCharacters', JSON.stringify(characters)); cancelEditChar(); renderCharacterList(); switchTab('chars'); 
    }

    // ==========================================
    // 💬 多重聊天室與「訊息修改」渲染引擎
    // ==========================================
    function renderSessionList() {
        const listDiv = document.getElementById('sessionList'); listDiv.innerHTML = '';
        if(chatSessions.length === 0) { listDiv.innerHTML = '<div style="text-align:center; color:#ffb7b2; padding:50px 0;">無紀錄，請去聯絡人發起聊天！</div>'; return; }
        chatSessions.sort((a, b) => b.time - a.time).forEach(session => { const char = characters.find(c => c.id === session.charId) || { name: '已刪除', avatar: '👻' }; const persona = personas.find(p => p.id === session.personaId) || { name: '未知' }; const card = document.createElement('div'); card.className = `card`; card.onclick = () => openSession(session.id); card.innerHTML = `${getAvatarHtml(char.avatar)}<div style="flex:1; overflow:hidden;"><div style="font-weight:bold; color:#555; display:flex; justify-content:space-between;"><span>${char.name}</span><span style="font-size:10px; color:#aaa; background:#f0f0f0; padding:2px 6px; border-radius:10px;">👤 ${persona.name}</span></div><div class="desc-text">${session.preview}</div></div>`; listDiv.appendChild(card); });
    }

    function createNewSession(charId) { 
        const char = characters.find(c => c.id === charId); const persona = personas.find(p => p.id === activePersonaId); 
        const sessionId = 's_' + Date.now(); const greetingText = char.greeting || '你好！'; 
        chatSessions.push({ id: sessionId, charId: charId, personaId: persona.id, preview: greetingText, time: Date.now() }); 
        localStorage.setItem('myChatSessions', JSON.stringify(chatSessions)); 
        localStorage.setItem(`history_${sessionId}`, JSON.stringify([{ role: "assistant", content: greetingText }])); 
        openSession(sessionId); 
    }

    function openSession(sessionId) { 
        activeSessionId = sessionId; const session = chatSessions.find(s => s.id === sessionId); 
        const char = characters.find(c => c.id === session.charId) || { name: '已刪除', avatar: '👻' }; 
        document.getElementById('chatHeaderName').innerText = char.name; 
        
        messageHistory = JSON.parse(localStorage.getItem(`history_${sessionId}`)) || []; 
        renderChatBox(); // 統一使用 renderChatBox 畫出所有對話
        switchTab('chat'); 
    }

    function deleteCurrentSession() { 
        if(!activeSessionId) return; 
        if(confirm("確定刪除此對話？")) { 
            chatSessions = chatSessions.filter(s => s.id !== activeSessionId); 
            localStorage.setItem('myChatSessions', JSON.stringify(chatSessions)); 
            localStorage.removeItem(`history_${activeSessionId}`); 
            activeSessionId = null; switchTab('sessions'); 
        } 
    }

    // 🌟 統一的聊天室繪製引擎 (支援動態修改)
    function renderChatBox() {
        if (!activeSessionId) return;
        const chatBox = document.getElementById('chatBox'); 
        chatBox.innerHTML = ''; 
        const session = chatSessions.find(s => s.id === activeSessionId);
        const char = characters.find(c => c.id === session.charId) || { avatar: '👻' }; 
        const persona = personas.find(p => p.id === session.personaId) || { avatar: '🎭' }; 
        
        messageHistory.forEach((msg, index) => {
            const row = document.createElement('div'); 
            row.className = `message-row ${msg.role === 'user' ? 'user' : 'ai'}`; 
            
            let avatarStyle = ''; let avatarChar = ''; 
            const targetAvatar = msg.role === 'user' ? persona.avatar : char.avatar; 
            if (targetAvatar && targetAvatar.startsWith('data:image')) avatarStyle = `background-image: url(${targetAvatar}); background-color: transparent;`; 
            else avatarChar = targetAvatar || (msg.role === 'user' ? '🎭' : '✨'); 

            // 在氣泡旁邊塞入修改按鈕 ✏️
            row.innerHTML = `
                <div class="msg-avatar" style="${avatarStyle}">${avatarChar}</div>
                <div class="message-bubble-wrap ${msg.role === 'user' ? 'user-wrap' : 'ai-wrap'}">
                    <div class="message ${msg.role === 'user' ? 'user-msg' : 'ai-msg'}">${msg.content}</div>
                    <div class="msg-action" onclick="openEditMsgModal(${index})" title="編輯此訊息">✏️</div>
                </div>
            `;
            chatBox.appendChild(row);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // ==========================================
    // 🔮 訊息修改魔法功能
    // ==========================================
    function openEditMsgModal(index) {
        const msg = messageHistory[index];
        document.getElementById('editMsgIndex').value = index;
        document.getElementById('editMsgTextarea').value = msg.content;
        document.getElementById('editMsgModal').style.display = 'flex';
    }

    function closeEditMsgModal() {
        document.getElementById('editMsgModal').style.display = 'none';
    }

    function saveEditedMessage() {
        const index = parseInt(document.getElementById('editMsgIndex').value);
        const newText = document.getElementById('editMsgTextarea').value.trim();
        
        if (!newText) { alert("訊息不能空白喔！"); return; }

        // 修改陣列裡的紀錄
        messageHistory[index].content = newText;
        localStorage.setItem(`history_${activeSessionId}`, JSON.stringify(messageHistory));

        // 如果修改的是最後一則訊息，要順便更新列表的預覽文字
        if (index === messageHistory.length - 1) {
            const session = chatSessions.find(s => s.id === activeSessionId);
            session.preview = newText.substring(0, 20) + (newText.length > 20 ? '...' : '');
            localStorage.setItem('myChatSessions', JSON.stringify(chatSessions));
        }

        closeEditMsgModal();
        renderChatBox(); // 重新畫出整個聊天室，更新完成！
    }


    // --- 🚀 核心對話發送系統 ---
    async function processMessage(source) {
        if (!activeSessionId) return;
        const session = chatSessions.find(s => s.id === activeSessionId);
        const char = characters.find(c => c.id === session.charId);
        const persona = personas.find(p => p.id === session.personaId);
        
        const inputId = source === 'chat' ? 'chatInput' : 'callInput';
        const inputEl = document.getElementById(inputId);
        const text = inputEl.value.trim();

        if (!HIDDEN_API_KEY || HIDDEN_API_KEY.includes("在這裡填寫")) { alert("管理員尚未在系統底層設定 API Key！"); return; }
        if (!text) return;

        // 1. 存入記憶並重新畫圖
        messageHistory.push({ role: "user", content: text });
        renderChatBox();
        
        if (source === 'call') document.getElementById('callSubtitle').innerHTML = `<span style="color:#ffb7b2;">我：</span>${text}`;
        inputEl.value = ''; inputEl.style.height = 'auto'; 
        
        session.preview = text.substring(0, 20) + (text.length > 20 ? '...' : ''); session.time = Date.now();
        localStorage.setItem('myChatSessions', JSON.stringify(chatSessions)); 
        localStorage.setItem(`history_${activeSessionId}`, JSON.stringify(messageHistory));

        // 2. 打包給 AI 
        let finalSystemPrompt = char ? char.prompt : '';
        if (persona && persona.prompt) finalSystemPrompt += `\n\n【關於使用者的設定(請以這個設定來認知跟我聊天)】:\n${persona.prompt}`;
        const apiMessages = [ { role: "system", content: finalSystemPrompt }, ...messageHistory ];

        try {
            // 讀取動畫
            let loadingRow;
            if (source === 'chat') { 
                loadingRow = document.createElement('div'); loadingRow.className = `message-row ai`; 
                loadingRow.innerHTML = `<div class="msg-avatar">✨</div><div class="message-bubble-wrap ai-wrap"><div class="message ai-msg">對方正在輸入...</div></div>`; 
                document.getElementById('chatBox').appendChild(loadingRow); 
                document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight; 
            } else { 
                document.getElementById('callSubtitle').innerHTML = `<span style="color:#aaa;">(對方正在思考...)</span>`; 
            }

            const response = await fetch(HIDDEN_API_URL, {
                method: "POST",
                headers: { "Authorization": `Bearer ${HIDDEN_API_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({ model: HIDDEN_MODEL, messages: apiMessages })
            });

            const data = await response.json();
            if (loadingRow) loadingRow.remove();

            if (data.choices && data.choices[0].message) {
                const aiReply = data.choices[0].message.content;
                
                // 收到回覆，存入記憶並重新畫圖
                messageHistory.push({ role: "assistant", content: aiReply });
                renderChatBox();
                
                if (source === 'call') document.getElementById('callSubtitle').innerText = aiReply;
                
                session.preview = aiReply.substring(0, 20) + (aiReply.length > 20 ? '...' : ''); session.time = Date.now();
                localStorage.setItem('myChatSessions', JSON.stringify(chatSessions)); 
                localStorage.setItem(`history_${activeSessionId}`, JSON.stringify(messageHistory));
            } else {
                alert("連線失敗，請聯繫管理員檢查額度。");
            }
        } catch (error) {
            alert("網路斷線：" + error.message);
        }
    }
</script>
